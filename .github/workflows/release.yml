# Release builds — on every v* tag, build the Linux artifacts and open a DRAFT
# GitHub release holding them:
#   • dough_<ver>_amd64.deb         (Ubuntu 22.04+/Debian 12+, self-contained)
#   • dough-<ver>-x86_64.AppImage   (universal Linux; + .zsync for delta updates)
#   • sdist + wheel                 (PyPI-shaped, also attached)
#   • SHA256SUMS
#
# The release is created as a DRAFT — a human reviews and clicks Publish. Publishing
# fires `release: published`, which triggers pypi-publish.yml (PyPI via OIDC). The
# tag IS the version (setuptools-scm), so cutting a release is `git tag vX.Y.Z`.
#
# workflow_dispatch builds everything and uploads workflow artifacts but creates no
# release (a dry run). Windows / winget / AUR / macOS channels are deferred — see
# docs/TODO.md.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least-privilege default: only the draft-release job needs write; build jobs run
# read-only so a compromised build step can't push to the repo.
permissions:
  contents: read

jobs:
  build-linux-deb:
    # Oldest supported LTS so the PyInstaller bundle's glibc floor stays low
    # (22.04 → works on 22.04+/Debian 12+).
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write # mint a Sigstore build-provenance attestation (free on public repos)
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # setuptools-scm derives the version from the tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libraries (PySide6 headless analysis)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install (render + freeze deps)
        run: |
          python -m pip install --upgrade pip
          pip install '.[bake]' pyinstaller
      - name: Resolve version
        id: ver
        # ONE source: setuptools-scm — the SAME engine as the wheel, so the deb /
        # AppImage / metainfo can't diverge from sdist/wheel on a non-canonical tag.
        # Strip the PEP 440 local segment (…+gHASH) so a dispatch dev build yields a
        # clean filename / Debian Version.
        run: |
          V="$(python -c 'import dough; print(dough.__version__.split("+")[0])')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Render manifests (inject the release) + freeze
        run: |
          # Render into the ephemeral checkout's packaging/ with the version's
          # <release>; date = the tagged commit's UTC day so it matches the .deb
          # changelog (which keys off the same commit via SOURCE_DATE_EPOCH).
          python -m dough.bake --packaging packaging \
            --release-version "${{ steps.ver.outputs.version }}" \
            --release-date "$(date -u -d "@$(git log -1 --format=%ct)" +%F)"
          pyinstaller packaging/pyinstaller/dough.spec --noconfirm
      - name: Frozen-bundle smoke test (Qt offscreen boot probe)
        # A fast in-runner boot on the BUILD host — proves the bundle starts. The
        # dedicated "Smoke-test the .deb in clean containers" step below is the one
        # that proves self-containment on a distro lacking the build-time libs.
        run: |
          test -x dist/dough/dough
          QT_QPA_PLATFORM=offscreen timeout 10 dist/dough/dough || [ $? -eq 124 ]
      - name: Build .deb
        run: bash packaging/deb/build_deb.sh "${{ steps.ver.outputs.version }}"
      - name: Smoke-test the .deb in clean containers (self-containment)
        # Install + boot the .deb on NEWER distros that lack the build-time libs —
        # proves the Qt-xcb Depends closure is complete (what the in-runner boot can't).
        run: |
          for img in ubuntu:24.04 debian:stable; do
            echo "::group::deb smoke $img"
            docker run --rm -v "$PWD:/src:ro" "$img" bash /src/packaging/deb/smoke_test_deb.sh
            echo "::endgroup::"
          done
      - name: Lint the .deb (lintian, advisory)
        continue-on-error: true
        run: |
          sudo apt-get install -y lintian
          lintian --no-tag-display-limit dist/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb
      - name: Attest .deb provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.deb

  build-linux-appimage:
    # Match the .deb's glibc floor (ubuntu-22.04 / glibc 2.35) so the AppImage runs
    # FORWARD onto every newer distro (AppImage is forward-compatible only).
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libraries to vendor (the Qt xcb closure) + an SVG rasterizer
        # build_appimage.sh vendors the ldd-closure of the Qt xcb plugin into the
        # AppImage, so every lib must be PRESENT here for ldd to resolve it (the
        # same closure the .deb declares as Depends). librsvg2-bin → a PNG .DirIcon.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libdbus-1-3 librsvg2-bin \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 \
            libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 libxcb-xkb1 \
            libxkbcommon0 libxkbcommon-x11-0 libfontconfig1 libfreetype6
      - name: Install (render + freeze deps)
        run: |
          python -m pip install --upgrade pip
          pip install '.[bake]' pyinstaller
      - name: Resolve version
        id: ver
        # One source: setuptools-scm (== the wheel). Strip the PEP 440 local segment.
        run: |
          V="$(python -c 'import dough; print(dough.__version__.split("+")[0])')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Render manifests (inject the release) + freeze
        run: |
          python -m dough.bake --packaging packaging \
            --release-version "${{ steps.ver.outputs.version }}" \
            --release-date "$(date -u -d "@$(git log -1 --format=%ct)" +%F)"
          pyinstaller packaging/pyinstaller/dough.spec --noconfirm
      - name: Build the AppImage
        run: bash packaging/appimage/build_appimage.sh "${{ steps.ver.outputs.version }}"
      - name: Smoke-test the AppImage in clean containers (self-containment)
        # Boot the AppImage on distros that have NEITHER the xcb closure — proves
        # the vendored libs make it self-contained (the trap that ships a broken bundle).
        run: |
          for img in ubuntu:24.04 debian:stable; do
            echo "::group::appimage smoke $img"
            docker run --rm -v "$PWD:/src:ro" "$img" bash /src/packaging/appimage/smoke_test_appimage.sh
            echo "::endgroup::"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: |
            dist/*.AppImage
            dist/*.AppImage.zsync
      - name: Attest AppImage provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.AppImage

  build-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - name: Attest sdist + wheel provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  draft-release:
    if: github.event_name == 'push'
    needs: [build-linux-deb, build-linux-appimage, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write # only this job mints the release
    steps:
      - uses: actions/checkout@v4 # for the curated notes + display name
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          SLUG="$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['tool']['dough']['metadata']['app_slug'])")"
          cd artifacts
          sha256sum "$SLUG"* > SHA256SUMS
          cat SHA256SUMS
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f docs/CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
              grab && /^## \[/ { grab = 0 }
              grab && /<!-- release-notes-end -->/ { grab = 0 }
              grab { print }
            ' docs/CHANGELOG.md > RELEASE_NOTES.md
          else
            : > RELEASE_NOTES.md
          fi
          # Backstop GitHub's 125000-char body cap (truncate on a UTF-8 boundary).
          if [ "$(wc -c < RELEASE_NOTES.md)" -gt 120000 ]; then
            python3 -c "import pathlib;p=pathlib.Path('RELEASE_NOTES.md');p.write_text(p.read_bytes()[:120000].decode('utf-8','ignore'),encoding='utf-8')"
            printf '\n\n_…truncated — see docs/CHANGELOG.md._\n' >> RELEASE_NOTES.md
          fi
          if grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for $VERSION — falling back to --generate-notes."
          fi
      - name: Create or update the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          NAME="$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['tool']['dough']['metadata']['display_name'])")"
          TITLE="$NAME $TAG"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating in place (idempotent re-run)."
            if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
              gh release edit "$TAG" --repo "$REPO" --draft --title "$TITLE" --notes-file RELEASE_NOTES.md
            else
              gh release edit "$TAG" --repo "$REPO" --draft --title "$TITLE"
            fi
            gh release upload "$TAG" --repo "$REPO" --clobber artifacts/*
          elif [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            gh release create "$TAG" --repo "$REPO" --draft --title "$TITLE" \
              --notes-file RELEASE_NOTES.md artifacts/*
          else
            gh release create "$TAG" --repo "$REPO" --draft --title "$TITLE" \
              --generate-notes artifacts/*
          fi
